<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Giskard</title>
<style>
  :root {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2230; --border:#2b3240;
    --fg:#e6edf3; --muted:#8b949e; --accent:#4f8cff; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  * { box-sizing:border-box; }
  body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); height:100vh; overflow:hidden; }
  button { font:inherit; color:var(--fg); background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:6px 10px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#fff; }
  input,select,textarea { font:inherit; color:var(--fg); background:var(--panel2); border:1px solid var(--border); border-radius:6px; padding:6px 8px; }
  .mono { font-family:var(--mono); }
  .muted { color:var(--muted); }

  /* login */
  #login { display:flex; height:100vh; align-items:center; justify-content:center; }
  #login .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:28px; width:320px; }
  #login h1 { margin:0 0 4px; }

  /* app grid — flanking column widths are user-resizable (persisted) via CSS vars. */
  #app { display:none; grid-template-columns:var(--col-left,260px) 6px minmax(360px,1fr) 6px var(--col-right,300px); height:100vh; }
  .col { height:100vh; overflow-y:auto; }
  .resizer { cursor:col-resize; background:transparent; transition:background .12s; }
  .resizer:hover, .resizer.active { background:var(--accent); }
  .sidebar { background:var(--panel); padding:12px; }
  /* The center column owns both dividers, so each delimiter line hugs the thread and the drag
     bar sits just outside it — symmetric on the left and right. */
  .center { display:flex; flex-direction:column; border-left:1px solid var(--border); border-right:1px solid var(--border); }
  .ctx { background:var(--panel); padding:12px; }

  .proj { margin-bottom:10px; }
  .proj > .name { font-weight:600; display:flex; justify-content:space-between; align-items:center; }
  .thread { padding:5px 8px; margin:3px 0 3px 8px; border-radius:6px; cursor:pointer; color:var(--muted); font-size:13px; }
  .thread:hover { background:var(--panel2); }
  .thread.active { background:var(--panel2); color:var(--fg); }

  header.thr { display:flex; gap:12px; align-items:center; padding:10px 14px; border-bottom:1px solid var(--border); background:var(--panel); flex-wrap:wrap; }
  header.thr .badge { font-size:12px; padding:2px 8px; border:1px solid var(--border); border-radius:20px; }
  header.thr .gauge { margin-left:auto; font-size:12px; }

  #transcript { flex:1; overflow-y:auto; padding:16px; }
  .msg { max-width:80%; margin:10px 0; padding:10px 12px; border-radius:10px; white-space:pre-wrap; word-wrap:break-word; }
  .msg.user { background:var(--accent); color:#fff; margin-left:auto; }
  .msg.agent { background:var(--panel2); }
  .msg.reasoning { background:transparent; border:1px dashed var(--border); color:var(--muted); font-size:13px; }
  .msg.cmd { background:#0b0e13; border:1px solid var(--border); }
  .msg.file { background:#101820; border:1px solid #28445f; }
  .msg.tool { background:#151521; border:1px solid #3b3b67; }
  .msg.activity { background:#13181c; border:1px solid var(--border); color:#c9d1d9; }
  .msg .role { font-size:11px; text-transform:uppercase; letter-spacing:.05em; opacity:.7; margin-bottom:4px; }
  pre.out { margin:0; font-family:var(--mono); font-size:12.5px; white-space:pre-wrap; }
  .item-list { margin:6px 0 0; padding-left:18px; }
  .item-list li { margin:2px 0; }
  .meta { margin-top:6px; color:var(--muted); font-size:12px; }

  .composer { display:flex; gap:8px; padding:12px; border-top:1px solid var(--border); background:var(--panel); }
  .composer textarea { flex:1; resize:none; height:52px; }
  .composer textarea:disabled { opacity:.65; cursor:not-allowed; }
  button:disabled { opacity:.55; cursor:not-allowed; }

  .notice { margin:8px 0; padding:8px 10px; border-radius:8px; border:1px solid var(--border); font-size:13px; }
  .notice.err { border-color:#f85149; color:#ffb4ae; }
  .notice.warn { border-color:#d29922; color:#f0d98c; }
  h3.sec { margin:16px 0 8px; font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); }
  .row { display:flex; gap:6px; margin:6px 0; }
  .kv { font-size:13px; margin:4px 0; }
  .kv b { color:var(--muted); font-weight:500; }
  .msg.pending { opacity:.7; }
  .msg.failed { border:1px solid #f85149; }
  .msg.error { background:#2a1416; border:1px solid #f85149; color:#ffb4ae; max-width:100%; }
  .msg.error .role { color:#f85149; opacity:1; }

  /* usage stat tiles (right column) */
  .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .stat { background:var(--panel2); border:1px solid var(--border); border-radius:8px; padding:8px 10px; }
  .statlabel { font-size:11px; text-transform:uppercase; letter-spacing:.04em; color:var(--muted); }
  .statval { font-size:16px; font-variant-numeric:tabular-nums; margin-top:2px; }

  /* modal dialog + directory picker */
  .overlay { position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:50; }
  .overlay.open { display:flex; }
  .dialog { background:var(--panel); border:1px solid var(--border); border-radius:10px; width:580px; max-width:92vw; max-height:88vh; display:flex; flex-direction:column; }
  .dialog h2 { margin:0; padding:16px 18px; border-bottom:1px solid var(--border); font-size:16px; }
  .dialog .content { padding:16px 18px; overflow-y:auto; }
  .dialog .foot { padding:12px 18px; border-top:1px solid var(--border); display:flex; gap:8px; justify-content:flex-end; align-items:center; }
  .dialog .foot .err { color:#ffb4ae; margin-right:auto; font-size:13px; }
  .pathbar { display:flex; gap:6px; align-items:center; justify-content:space-between; font-size:12px; color:var(--muted); margin-bottom:6px; }
  .pathbar .cur { word-break:break-all; }
  .dirlist { border:1px solid var(--border); border-radius:8px; height:240px; overflow-y:auto; background:var(--panel2); }
  .direntry { padding:6px 10px; display:flex; gap:8px; align-items:center; cursor:pointer; font-size:13px; border-bottom:1px solid rgba(255,255,255,.03); }
  .direntry:last-child { border-bottom:0; }
  .direntry:hover { background:var(--bg); }
  .direntry.file { color:var(--muted); cursor:default; }
  .direntry.file:hover { background:transparent; }
  .direntry .ic { width:16px; text-align:center; opacity:.85; }
  .field { margin-top:12px; }
  .field label { display:block; font-size:12px; color:var(--muted); margin-bottom:4px; }
  .field input, .field select { width:100%; }
  .field .hint { font-size:11px; color:var(--muted); margin-top:4px; }

  /* =================== Appearance themes ===================
     Three selectable looks (persisted client-side). Each sets a palette; IDE and Terminal also
     restyle the transcript into role-gutter rows. The DOM is identical across themes (.msg holds
     .role + .body), so switching is pure CSS. */
  :root[data-appearance="ide"] {
    --bg:#0d1117; --panel:#0f141b; --panel2:#161d28; --border:#222b38;
    --fg:#dbe2ea; --muted:#79838f; --accent:#3b82f6;
  }
  :root[data-appearance="bubbles"] {
    --bg:#0e1116; --panel:#161b22; --panel2:#1c2230; --border:#2b3240;
    --fg:#e6edf3; --muted:#8b949e; --accent:#5b8def;
  }
  :root[data-appearance="terminal"] {
    --bg:#0a0d0b; --panel:#0d110e; --panel2:#131813; --border:#212a20;
    --fg:#cdd6cd; --muted:#7f8c7f; --accent:#5ec27e;
  }

  /* Bubbles — a softer, less saturated take on the default chat bubbles. */
  [data-appearance="bubbles"] .msg { border-radius:14px; }
  [data-appearance="bubbles"] .msg.user { box-shadow:none; }

  /* IDE — flat, full-width rows with a right-aligned role gutter; no chat bubbles. */
  [data-appearance="ide"] #transcript { padding:0; }
  [data-appearance="ide"] .msg {
    max-width:100%; margin:0; padding:11px 18px; border-radius:0; background:transparent;
    border:0; border-bottom:1px solid var(--border);
    display:grid; grid-template-columns:78px 1fr; column-gap:16px; align-items:start;
  }
  [data-appearance="ide"] .msg .role { margin:0; padding-top:1px; text-align:right; opacity:1; color:var(--muted); }
  [data-appearance="ide"] .msg.user { background:rgba(59,130,246,.07); color:var(--fg); }
  [data-appearance="ide"] .msg.user .role { color:var(--accent); }
  [data-appearance="ide"] .msg.reasoning { border:0; border-bottom:1px solid var(--border); font-style:italic; color:var(--muted); }
  [data-appearance="ide"] .msg.cmd,
  [data-appearance="ide"] .msg.file,
  [data-appearance="ide"] .msg.tool,
  [data-appearance="ide"] .msg.activity { border:0; border-bottom:1px solid var(--border); }
  [data-appearance="ide"] .msg.cmd { background:var(--panel2); }
  [data-appearance="ide"] .msg.error { background:rgba(248,81,73,.09); border:0; border-bottom:1px solid var(--border); }
  [data-appearance="ide"] .msg.error .role { color:#f85149; }

  /* Terminal — dense, monospace, log-style rows. */
  [data-appearance="terminal"] body { font-family:var(--mono); }
  [data-appearance="terminal"] #transcript { padding:10px 12px; }
  [data-appearance="terminal"] .msg {
    max-width:100%; margin:0; padding:1px 0; border:0; border-radius:0; background:transparent;
    display:grid; grid-template-columns:66px 1fr; column-gap:10px;
    font-family:var(--mono); font-size:12.5px; line-height:1.55;
  }
  [data-appearance="terminal"] .msg .role { margin:0; text-align:right; text-transform:lowercase; letter-spacing:0; opacity:1; color:var(--muted); }
  [data-appearance="terminal"] .msg.user, [data-appearance="terminal"] .msg.agent,
  [data-appearance="terminal"] .msg.cmd, [data-appearance="terminal"] .msg.file,
  [data-appearance="terminal"] .msg.tool, [data-appearance="terminal"] .msg.activity { background:transparent; border:0; color:var(--fg); }
  [data-appearance="terminal"] .msg.user .role { color:var(--accent); }
  [data-appearance="terminal"] .msg.reasoning { background:transparent; border:0; color:var(--muted); }
  [data-appearance="terminal"] .msg.error { background:transparent; border:0; color:#ff9d96; }
  [data-appearance="terminal"] .msg.error .role { color:#ff6b63; }
</style>
</head>
<body>
  <div id="login">
    <form class="card" id="loginForm">
      <h1>Giskard</h1>
      <p class="muted">Enter the app password to continue.</p>
      <div class="row"><input id="pw" type="password" placeholder="Password" style="flex:1" autofocus /></div>
      <div class="row"><button class="primary" type="submit" style="flex:1">Log in</button></div>
      <div id="loginErr" class="muted"></div>
    </form>
  </div>

  <div id="app">
    <div class="col sidebar">
      <div class="row"><b style="flex:1">Projects</b><button id="newProj" title="New project">+</button></div>
      <div id="projects"></div>
    </div>

    <div class="resizer" id="resizeLeft" title="Drag to resize"></div>

    <div class="col center">
      <header class="thr" id="thrHeader" style="display:none">
        <span class="badge mono" id="thrTitle">—</span>
        <button id="modeBtn" class="badge" title="Toggle Plan/Build">build</button>
        <select id="modelSel" class="mono"></select>
        <span class="gauge muted mono" id="gauge">0 / 0</span>
      </header>
      <div id="transcript" class="muted" style="padding:24px">Select or create a thread to begin.</div>
      <div class="composer" id="composer" style="display:none">
        <textarea id="input" placeholder="Message the agent…  (Enter to send, Shift+Enter for newline)"></textarea>
        <button class="primary" id="sendBtn">Send</button>
      </div>
    </div>

    <div class="resizer" id="resizeRight" title="Drag to resize"></div>

    <div class="col ctx">
      <div class="field" style="margin-top:0">
        <label for="appearanceSel">Appearance</label>
        <select id="appearanceSel">
          <option value="ide">Professional (IDE)</option>
          <option value="bubbles">Bubbles</option>
          <option value="terminal">Terminal</option>
        </select>
      </div>
      <h3 class="sec">Usage</h3>
      <div id="ctxTokens" class="muted">No thread open.</div>
      <div id="notices"></div>
    </div>
  </div>

  <!-- New-project dialog with a directory picker -->
  <div class="overlay" id="projectModal">
    <div class="dialog">
      <h2>New project</h2>
      <div class="content">
        <div class="pathbar">
          <span class="cur mono" id="pmPath">/</span>
          <button id="pmNewFolder" title="Create a folder here">New folder</button>
        </div>
        <div class="dirlist" id="pmList"></div>
        <div class="field">
          <label for="pmName">Project name</label>
          <input id="pmName" placeholder="Project name" />
          <div class="hint">Defaults to the folder name; edit to distinguish same-named folders.</div>
        </div>
        <div class="field">
          <label for="pmModel">Default model</label>
          <select id="pmModel" class="mono"></select>
        </div>
        <div class="field">
          <label for="pmApproval">Approval policy</label>
          <select id="pmApproval">
            <option value="auto">auto — run without asking</option>
            <option value="ask">ask — prompt before actions</option>
            <option value="read_only">read only</option>
          </select>
        </div>
      </div>
      <div class="foot">
        <span class="err" id="pmErr"></span>
        <button id="pmCancel">Cancel</button>
        <button class="primary" id="pmCreate">Create project</button>
      </div>
    </div>
  </div>

<script>
"use strict";
const $ = (id) => document.getElementById(id);
let state = {
  projectId:null, threadId:null, mode:"build", ws:null, wsStatus:"closed", wsConnectId:0,
  models:[], streamEl:null, streamItemId:null, pendingUserEl:null, pendingUserText:null, pendingClientMsgs:[],
  streamElsByItemId:new Map(), renderedItemIds:new Set(), renderedHarnessItemIds:new Set(), itemKindsByItemId:new Map()
};

async function api(method, path, body) {
  const opts = { method, headers:{} };
  if (body !== undefined) { opts.headers["Content-Type"]="application/json"; opts.body=JSON.stringify(body); }
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error((await r.text()) || r.status);
  const ct = r.headers.get("content-type")||"";
  return ct.includes("json") ? r.json() : r.text();
}

/* ---------- auth ---------- */
$("loginForm").onsubmit = async (e) => {
  e.preventDefault();
  try {
    const res = await api("POST","/api/login",{ password:$("pw").value });
    if (res && res.ok === false) { $("loginErr").textContent="Wrong password."; return; }
    startApp();
  } catch (err) { $("loginErr").textContent = "Login failed: "+err.message; }
};

async function startApp() {
  $("login").style.display="none";
  $("app").style.display="grid";
  try { state.models = (await api("GET","/api/models")).models || []; } catch { state.models=[]; }
  renderModelSelect();
  await loadProjects();
}

/* ---------- projects & threads ---------- */
async function loadProjects() {
  const { projects } = await api("GET","/api/projects");
  const box = $("projects"); box.innerHTML="";
  const pending = [];
  for (const p of projects) {
    const d = document.createElement("div"); d.className="proj";
    const name = document.createElement("div"); name.className="name";
    const label = document.createElement("span"); label.textContent = p.name;
    const add = document.createElement("button"); add.textContent="+"; add.title="New thread";
    add.onclick = () => newThread(p.id);
    name.append(label, add); d.append(name);
    const threads = document.createElement("div"); threads.id = "threads-"+p.id; d.append(threads);
    box.append(d);
    pending.push(loadThreads(p.id));
  }
  await Promise.all(pending);
  restoreLastThread();
}

// Reopen the thread that was last active in this browser (H: persisted client-side, not on the
// server). Silently ignored if it no longer exists (e.g. deleted since).
function restoreLastThread() {
  if (state.threadId) return;   // already viewing a thread
  let last;
  try { last = JSON.parse(localStorage.getItem("giskard.lastThread") || "null"); } catch { last = null; }
  if (!last || !last.pid || !last.tid) return;
  const el = document.querySelector(`.thread[data-tid="${last.tid}"]`);
  if (!el) { localStorage.removeItem("giskard.lastThread"); return; }
  openThread(last.pid, last.tid, el.textContent, { silent:true });
}

async function loadThreads(pid) {
  const box = $("threads-"+pid); if (!box) return;
  try {
    const { threads } = await api("GET",`/api/projects/${pid}/threads`);
    box.innerHTML="";
    for (const t of threads) {
      const el = document.createElement("div"); el.className="thread mono";
      el.textContent = t.title || t.id.slice(0,8); el.dataset.tid = t.id;
      el.onclick = () => openThread(pid, t.id, t.title);
      box.append(el);
    }
  } catch {}
}

/* ---------- new-project modal + directory picker ---------- */
$("newProj").onclick = () => openProjectModal();

function openProjectModal() {
  $("pmErr").textContent = "";
  // Populate the model picker from the loaded models.
  const sel = $("pmModel"); sel.innerHTML = "";
  for (const m of state.models) {
    const o = document.createElement("option");
    o.value = `${m.provider}/${m.model}`; o.textContent = m.display_name || m.model;
    o.dataset.provider = m.provider; o.dataset.model = m.model;
    sel.append(o);
  }
  if (!state.models.length) { const o=document.createElement("option"); o.textContent="(no models configured)"; sel.append(o); }
  $("projectModal").classList.add("open");
  // Start browsing where we last were, falling back to the filesystem root.
  browsePicker(localStorage.getItem("giskard.lastBrowse") || "/");
}
function closeProjectModal() { $("projectModal").classList.remove("open"); }
$("pmCancel").onclick = closeProjectModal;
$("projectModal").addEventListener("click", (e) => { if (e.target === $("projectModal")) closeProjectModal(); });

function basename(p) { const s = String(p).replace(/\/+$/,""); const i = s.lastIndexOf("/"); return i>=0 ? s.slice(i+1) : s; }
function parentOf(p) { const s = String(p).replace(/\/+$/,""); const i = s.lastIndexOf("/"); return i>0 ? s.slice(0,i) : "/"; }

async function browsePicker(path) {
  let res;
  try { res = await api("GET", `/api/browse?path=${encodeURIComponent(path)}`); }
  catch (e) { $("pmErr").textContent = "Cannot open folder: "+e.message; return; }
  state.pickerDir = res.path;
  localStorage.setItem("giskard.lastBrowse", res.path);
  $("pmPath").textContent = res.path;
  // Prefill the project name from the current folder's basename (still editable).
  $("pmName").value = basename(res.path) || res.path;
  $("pmErr").textContent = "";

  const list = $("pmList"); list.innerHTML = "";
  if (res.path !== "/") {
    const up = document.createElement("div"); up.className = "direntry";
    up.innerHTML = `<span class="ic">↰</span><span>..</span>`;
    up.onclick = () => browsePicker(parentOf(res.path));
    list.append(up);
  }
  for (const e of res.entries) {
    const row = document.createElement("div");
    row.className = "direntry" + (e.is_dir ? "" : " file");
    row.innerHTML = `<span class="ic">${e.is_dir ? "📁" : "📄"}</span><span>${escapeHtml(e.name)}</span>`;
    if (e.is_dir) {
      const child = res.path.replace(/\/+$/,"") + "/" + e.name;
      row.onclick = () => browsePicker(child);
    }
    list.append(row);
  }
}

$("pmNewFolder").onclick = async () => {
  const name = prompt("New folder name:"); if (!name) return;
  try {
    const res = await api("POST","/api/browse/mkdir",{ parent: state.pickerDir, name });
    await browsePicker(res.path);   // navigate into the folder we just created
  } catch (e) { $("pmErr").textContent = "Create folder failed: "+e.message; }
};

$("pmCreate").onclick = async () => {
  const dir = state.pickerDir;
  const name = $("pmName").value.trim();
  if (!dir) { $("pmErr").textContent = "Pick a folder first."; return; }
  if (!name) { $("pmErr").textContent = "Enter a project name."; return; }
  const opt = $("pmModel").selectedOptions[0];
  const model = opt && opt.dataset.model
    ? { provider: opt.dataset.provider, model: opt.dataset.model, reasoning_effort:null }
    : { provider:"openai", model:"gpt-5.5", reasoning_effort:null };
  const approval_policy = $("pmApproval").value;
  try {
    await api("POST","/api/projects",{ name, dir, default_model:model, approval_policy });
    closeProjectModal();
    await loadProjects();
  } catch (e) { $("pmErr").textContent = "Create project failed: "+e.message; }
};

async function newThread(pid) {
  try {
    const res = await api("POST",`/api/projects/${pid}/threads`,{ resume:null });
    await loadThreads(pid);
    await openThread(pid, res.thread_id, "New thread");
  } catch (e) { alert("New thread failed: "+e.message); }
}

/* ---------- thread view + websocket ---------- */
async function openThread(pid, tid, title, opts) {
  opts = opts || {};
  let res;
  try {
    res = await api("POST",`/api/projects/${pid}/threads`,{ thread_id:tid, resume:null });
    tid = res.thread_id || tid;
  } catch (e) {
    if (opts.silent) { localStorage.removeItem("giskard.lastThread"); return; }
    alert("Open thread failed: "+e.message);
    return;
  }

  // Remember this thread so a browser reload resumes it (client-side only).
  try { localStorage.setItem("giskard.lastThread", JSON.stringify({ pid, tid })); } catch {}

  state.projectId = pid; state.threadId = tid; state.pendingUserEl = null; state.pendingUserText = null;
  state.historyLoaded = false; state.oldestTurnId = null; state.hasMoreHistory = false;
  state.loadingHistory = false; state.pendingOlder = false;
  resetRenderState();
  document.querySelectorAll(".thread").forEach(e => e.classList.toggle("active", e.dataset.tid===tid));
  $("thrHeader").style.display="flex"; $("composer").style.display="flex";
  $("thrTitle").textContent = title || tid.slice(0,8);
  $("transcript").className=""; $("transcript").innerHTML=""; $("notices").innerHTML="";
  if (res.warning) notice(res.warning.message || "warning", res.warning.severity || "warning");
  connectWs();
}

async function connectWs() {
  const oldWs = state.ws;
  state.ws = null;
  if (oldWs) { try { oldWs.close(); } catch {} }
  const connectId = ++state.wsConnectId;
  state.pendingClientMsgs = [];
  setWsStatus("connecting");
  const proto = location.protocol==="https:" ? "wss" : "ws";
  let ticket;
  try {
    ticket = (await api("GET","/api/ws-ticket")).ticket;
  } catch (e) {
    if (connectId !== state.wsConnectId) return;
    setWsStatus("closed");
    failPendingUserMessage("Message not sent: could not authorize WebSocket.");
    notice("WebSocket authorization failed: "+e.message, "error");
    return;
  }
  if (connectId !== state.wsConnectId) return;
  const ws = new WebSocket(`${proto}://${location.host}/api/ws?ticket=${encodeURIComponent(ticket)}`);
  state.ws = ws;
  ws.onopen = () => {
    if (state.ws !== ws) return;
    setWsStatus("open");
    send({ type:"subscribe", thread_id: state.threadId });
    flushPendingClientMsgs();
  };
  ws.onmessage = (m) => {
    try {
      handleServer(JSON.parse(m.data));
    } catch (e) {
      notice("Invalid WebSocket message from server: "+e.message, "error");
    }
  };
  ws.onerror = () => {
    if (state.ws !== ws) return;
    notice("WebSocket connection failed.", "error");
  };
  ws.onclose = (ev) => {
    if (state.ws !== ws) return;
    setWsStatus("closed");
    failPendingUserMessage("Message not sent: WebSocket closed.");
    const reason = ev.reason ? ` ${ev.reason}` : "";
    const code = ev.code ? ` (${ev.code})` : "";
    notice(`WebSocket closed${code}.${reason}`, "error");
  };
}
function setWsStatus(status) {
  state.wsStatus = status;
  const ready = status==="open";
  $("sendBtn").disabled = !ready && status!=="connecting";
  $("input").disabled = status==="closed";
  $("input").placeholder =
    status==="open" ? "Message the agent…  (Enter to send, Shift+Enter for newline)" :
    status==="connecting" ? "Connecting to agent…" :
    "WebSocket disconnected";
}
function flushPendingClientMsgs() {
  const pending = state.pendingClientMsgs.splice(0);
  for (const msg of pending) send(msg);
}
function send(obj, opts) {
  opts = opts || {};
  if (state.ws && state.ws.readyState===1) {
    state.ws.send(JSON.stringify(obj));
    return true;
  }
  if (opts.queue && state.wsStatus==="connecting") {
    state.pendingClientMsgs.push(obj);
    return true;
  }
  return false;
}
function failPendingUserMessage(text) {
  if (!state.pendingUserEl) return;
  state.pendingUserEl.classList.remove("pending");
  state.pendingUserEl.classList.add("failed");
  state.pendingUserEl = null;
  state.pendingUserText = null;
  if (text) notice(text, "error");
}

function handleServer(msg) {
  switch (msg.type) {
    case "thread_state": renderThreadState(msg.state); break;
    case "history_page": renderHistoryPage(msg); break;
    case "live_turn_snapshot": renderLiveTurnSnapshot(msg); break;
    case "event": handleEvent(msg.agent_event); break;
    case "token_update": renderTokens(msg.ledger); break;
    case "approval_request": notice("Approval requested: "+JSON.stringify(msg.request.kind)); break;
    case "error":
      if (msg.action==="send_input" && state.pendingUserEl) {
        failPendingUserMessage(null);
      }
      notice(msg.message||"error", msg.severity||"error");
      break;
  }
}

function renderThreadState(s) {
  if (!s) return;
  state.mode = s.mode || "build";
  $("modeBtn").textContent = state.mode;
  if (s.current_model) setModel(`${s.current_model.provider}/${s.current_model.model}`);
  // The header already owns title / mode / model; the right column is usage-only now.
  if (s.title) $("thrTitle").textContent = s.title;
  if (s.tokens) renderTokens(s.tokens);
  updateGauge(s.tokens ? s.tokens.total.total : 0, s.context_window || 0);
  // History now arrives separately via `history_page` (H6); clear the transcript ready for it.
  $("transcript").innerHTML="";
  resetRenderState();
}

// Render the most recent page of persisted history (H6), oldest-first. Older pages are available
// via LoadHistory { before: oldestTurnId } when has_more is set (wired to the "Load older" button).
function renderHistoryPage(msg) {
  const older = state.pendingOlder;       // was this page requested by a scroll-up LoadHistory?
  state.pendingOlder = false;
  state.loadingHistory = false;
  state.hasMoreHistory = !!msg.has_more;
  const turns = msg.turns || [];
  if (turns.length) state.oldestTurnId = turns[0].id;   // turns are oldest-first

  if (older) {
    // Render into a detached container, then prepend to the top and preserve the scroll position
    // so the viewport doesn't jump while older content is inserted (infinite scroll).
    const container = document.createElement("div");
    const prev = state.renderTarget;
    state.renderTarget = container;
    for (const turn of turns) renderPersistedTurn(turn);
    state.renderTarget = prev;

    const t = $("transcript");
    const heightBefore = t.scrollHeight;
    const anchor = t.firstChild;
    while (container.firstChild) t.insertBefore(container.firstChild, anchor);
    t.scrollTop += t.scrollHeight - heightBefore;
  } else {
    for (const turn of turns) renderPersistedTurn(turn);
  }
}

// Render one persisted turn from history: its items, plus the user message and any failure that
// aren't captured as items. A turn that failed before producing output (e.g. a quota rejection)
// has no user_message item, so we render `user_input` directly; its `status.message` then explains
// why the message got no agent response — the record that a transient toast used to lose.
function renderPersistedTurn(turn) {
  const items = turn.items || [];
  const hasUserItem = items.some(it => ((it.payload||it).kind) === "user_message");
  const inputText = turn.user_input && turn.user_input.text;
  if (!hasUserItem && inputText) {
    renderItemBody(bubble("user","you"), { kind:"user_message", text: inputText });
  }
  for (const it of items) addItem(it);
  const st = turn.status;
  if (st && (st.kind==="failed" || st.kind==="interrupted")) {
    errorBubble(st.message || (st.kind==="interrupted" ? "Turn interrupted." : "Turn failed."));
  }
}

// Load older history when the user scrolls near the top (H4/H6 infinite scroll).
function onTranscriptScroll() {
  const t = $("transcript");
  if (t.scrollTop < 80 && state.hasMoreHistory && !state.loadingHistory && state.oldestTurnId && state.threadId) {
    state.loadingHistory = true;
    state.pendingOlder = true;
    send({ type:"load_history", thread_id: state.threadId, before: state.oldestTurnId });
  }
}

function handleEvent(ev) {
  switch (ev.kind) {
    case "turn_started":
      state.streamEl = null;
      state.streamItemId = null;
      state.streamElsByItemId.clear();
      state.itemKindsByItemId.clear();
      break;
    case "item_started":
      if (ev.item) state.itemKindsByItemId.set(idKey(ev.item.id), ev.item.kind);
      break;
    case "item_delta":
      if (ev.delta && ev.delta.type==="text") appendStream(ev.delta.text, ev.item_id, ev.delta.type);
      else if (ev.delta && ev.delta.type==="command_output") appendStream(ev.delta.chunk, ev.item_id, ev.delta.type);
      break;
    case "item_completed":
      if (!finalizeStreamedItem(ev.item)) addItem(ev.item);
      break;
    case "turn_completed":
      state.streamEl=null;
      state.streamItemId=null;
      state.streamElsByItemId.clear();
      state.itemKindsByItemId.clear();
      break;
    case "approval_requested": notice("Approval requested"); break;
    // Render errors as a persistent transcript entry (tied to the turn/message that caused them)
    // rather than a toast that vanishes — so looking back at a thread explains why a message got
    // no agent response. The matching failed turn is also persisted server-side (§7.1).
    case "error":
      failPendingUserMessage(null);   // resolve the optimistic bubble to a failed state
      errorBubble(errorText(ev.error));
      break;
  }
}

// A persistent, transcript-anchored error entry (respects renderTarget for history prepends).
function errorBubble(message) {
  bubble("error","error").textContent = message || "error";
}
function errorText(e) {
  if (!e) return "error";
  if (typeof e === "string") return e;
  return e.message || e.detail || JSON.stringify(e);
}

function renderLiveTurnSnapshot(snap) {
  for (const ev of (snap.accumulated||[])) handleEvent(ev);
  if (snap.pending_approval) notice("Approval requested: "+JSON.stringify(snap.pending_approval.kind));
}

// Where new bubbles are appended: the live transcript, or a detached container when rendering an
// older history page for prepending (infinite scroll).
function renderTarget() { return state.renderTarget || $("transcript"); }
function bubble(cls, role) {
  const el = document.createElement("div"); el.className="msg "+cls;
  const r = document.createElement("div"); r.className="role"; r.textContent=role;
  const body = document.createElement("div"); body.className="body";
  el.append(r, body);
  const t = renderTarget();
  t.append(el);
  if (!state.renderTarget) t.scrollTop = t.scrollHeight;
  return body;
}
function appendStream(text, itemId, deltaType) {
  const key = idKey(itemId);
  if (key && state.renderedItemIds.has(key)) return;
  let body = key ? state.streamElsByItemId.get(key) : state.streamEl;
  if (!body) {
    const kind = key ? state.itemKindsByItemId.get(key) : null;
    body = bubble(classForStream(kind, deltaType), roleForStream(kind, deltaType));
    if (key) state.streamElsByItemId.set(key, body);
  }
  state.streamEl = body;
  state.streamItemId = key || null;
  body.textContent += text;
  $("transcript").scrollTop = $("transcript").scrollHeight;
}
function finalizeStreamedItem(item) {
  if (!item || !item.payload) return false;
  const key = idKey(item.id);
  const body = (key && state.streamElsByItemId.get(key)) || (state.streamItemId===key ? state.streamEl : null);
  if (!hasVisiblePayload(item.payload)) {
    if (body && !body.textContent.trim()) body.parentElement.remove();
    markRenderedItem(item);
    if (state.streamEl === body) {
      state.streamEl = null;
      state.streamItemId = null;
    }
    return true;
  }
  if (!body) return false;
  renderItemBody(body, item.payload);
  markRenderedItem(item);
  if (state.streamEl === body) {
    state.streamEl = null;
    state.streamItemId = null;
  }
  $("transcript").scrollTop = $("transcript").scrollHeight;
  return true;
}
function addItem(item) {
  const p = item && item.payload ? item.payload : item;
  if (!p) return;
  if (isRenderedItem(item)) return;
  if (!hasVisiblePayload(p)) {
    markRenderedItem(item);
    return;
  }
  if (p.kind==="user_message") {
    if (state.pendingUserEl && p.text===state.pendingUserText) {
      state.pendingUserEl.classList.remove("pending");
      state.pendingUserEl.querySelector(".body").textContent = p.text;
      state.pendingUserEl = null;
      state.pendingUserText = null;
      markRenderedItem(item);
      return;
    }
    renderItemBody(bubble("user","you"), p);
  }
  else renderItemBody(bubble(classForPayload(p), roleForPayload(p)), p);
  markRenderedItem(item);
}
function resetRenderState() {
  state.streamEl = null;
  state.streamItemId = null;
  state.streamElsByItemId = new Map();
  state.renderedItemIds = new Set();
  state.renderedHarnessItemIds = new Set();
  state.itemKindsByItemId = new Map();
}
function idKey(id) {
  return id === undefined || id === null ? "" : String(id);
}
function isRenderedItem(item) {
  const itemId = idKey(item && item.id);
  const harnessItemId = item && item.harness_item_id;
  return (itemId && state.renderedItemIds.has(itemId)) ||
    (harnessItemId && state.renderedHarnessItemIds.has(harnessItemId));
}
function markRenderedItem(item) {
  const itemId = idKey(item && item.id);
  if (itemId) {
    state.renderedItemIds.add(itemId);
    state.streamElsByItemId.delete(itemId);
    state.itemKindsByItemId.delete(itemId);
  }
  if (item && item.harness_item_id) state.renderedHarnessItemIds.add(item.harness_item_id);
}
function hasVisiblePayload(p) {
  if (!p || !p.kind) return false;
  if (p.kind==="command_execution") return Boolean((p.command||"").trim() || (p.output||"").trim());
  if (p.kind==="agent_message" || p.kind==="reasoning" || p.kind==="user_message") return Boolean((p.text||"").trim());
  if (p.kind==="file_change") return Boolean((p.path||"").trim() || (p.changes||[]).length || p.status);
  if (p.kind==="tool_call") return Boolean((p.name||"").trim() || (p.server||"").trim() || p.status || p.error || p.input || p.output);
  if (p.kind==="activity") return Boolean((p.title||"").trim() || (p.detail||"").trim() || p.metadata);
  return false;
}
function renderItemBody(body, p) {
  const msg = body.parentElement;
  msg.className = "msg " + classForPayload(p);
  msg.querySelector(".role").textContent = roleForPayload(p);
  if (p.kind==="command_execution") {
    body.innerHTML = `<div class="mono">$ ${escapeHtml(p.command)}</div><pre class="out">${escapeHtml(p.output||"")}</pre>`;
  } else if (p.kind==="agent_message" || p.kind==="reasoning" || p.kind==="user_message") {
    body.textContent = p.text;
  } else if (p.kind==="file_change") {
    body.innerHTML = renderFileChange(p);
  } else if (p.kind==="tool_call") {
    body.innerHTML = renderToolCall(p);
  } else if (p.kind==="activity") {
    body.innerHTML = renderActivity(p);
  }
}
function classForPayload(p) {
  if (p.kind==="user_message") return "user";
  if (p.kind==="reasoning") return "reasoning";
  if (p.kind==="command_execution") return "cmd";
  if (p.kind==="file_change") return "file";
  if (p.kind==="tool_call") return "tool";
  if (p.kind==="activity") return "activity";
  return "agent";
}
function roleForPayload(p) {
  if (p.kind==="user_message") return "you";
  if (p.kind==="reasoning") return "reasoning";
  if (p.kind==="command_execution") return "command";
  if (p.kind==="file_change") return "files";
  if (p.kind==="tool_call") return "tool";
  if (p.kind==="activity") return "activity";
  return "agent";
}
function classForStream(kind, deltaType) {
  if (deltaType==="command_output" || kind==="command_execution") return "cmd";
  if (kind==="reasoning") return "reasoning";
  if (kind==="file_change") return "file";
  if (kind==="tool_call") return "tool";
  if (kind==="activity") return "activity";
  return "agent";
}
function roleForStream(kind, deltaType) {
  if (deltaType==="command_output" || kind==="command_execution") return "command";
  if (kind==="reasoning") return "reasoning";
  if (kind==="file_change") return "files";
  if (kind==="tool_call") return "tool";
  if (kind==="activity") return "activity";
  return "agent";
}
function renderFileChange(p) {
  const changes = (p.changes && p.changes.length) ? p.changes : [{ path:p.path, change:p.change }];
  const items = changes.map(c => `<li><span class="mono">${escapeHtml(c.change||"modified")}</span> ${escapeHtml(c.path||"")}</li>`).join("");
  const status = p.status ? `<div class="meta">status: ${escapeHtml(p.status)}</div>` : "";
  return `<div>File change${changes.length===1 ? "" : "s"}</div><ul class="item-list">${items}</ul>${status}`;
}
function renderToolCall(p) {
  const head = `${p.server ? escapeHtml(p.server)+":" : ""}${escapeHtml(p.name||"tool")}`;
  const status = p.status ? ` <span class="muted">(${escapeHtml(p.status)})</span>` : "";
  const input = p.input!==undefined && p.input!==null ? `<pre class="out">${escapeHtml(jsonPreview(p.input))}</pre>` : "";
  const output = p.output!==undefined && p.output!==null ? `<pre class="out">${escapeHtml(jsonPreview(p.output))}</pre>` : "";
  const err = p.error ? `<div class="meta">error: ${escapeHtml(p.error)}</div>` : "";
  return `<div class="mono">${head}${status}</div>${input}${output}${err}`;
}
function renderActivity(p) {
  const detail = p.detail ? `<div>${escapeHtml(p.detail)}</div>` : "";
  const meta = p.metadata ? `<pre class="out">${escapeHtml(jsonPreview(p.metadata))}</pre>` : "";
  return `<div>${escapeHtml(p.title||"Activity")}</div>${detail}${meta}`;
}
function jsonPreview(v) {
  try { return typeof v==="string" ? v : JSON.stringify(v, null, 2); }
  catch { return String(v); }
}

/* ---------- composer + controls ---------- */
function sendInput() {
  const ta = $("input"); const text = ta.value.trim(); if (!text || !state.threadId) return;
  const body = bubble("user pending","you");
  body.textContent = text;
  const msgEl = body.parentElement;
  if (!send({ type:"send_input", thread_id: state.threadId, text }, { queue:true })) {
    msgEl.classList.remove("pending");
    msgEl.classList.add("failed");
    notice(`Message not sent: WebSocket is ${state.wsStatus}.`, "error");
    return;
  }
  state.pendingUserEl = msgEl;
  state.pendingUserText = text;
  ta.value="";
}
$("sendBtn").onclick = sendInput;
$("input").addEventListener("keydown", (e) => { if (e.key==="Enter" && !e.shiftKey) { e.preventDefault(); sendInput(); } });

$("modeBtn").onclick = () => {
  state.mode = state.mode==="build" ? "plan" : "build";
  $("modeBtn").textContent = state.mode;
  send({ type:"switch_mode", thread_id: state.threadId, mode: state.mode });
};

function renderModelSelect() {
  const sel = $("modelSel"); sel.innerHTML="";
  for (const m of state.models) {
    const o = document.createElement("option");
    o.value = `${m.provider}/${m.model}`; o.textContent = m.display_name || m.model; o.dataset.provider=m.provider; o.dataset.model=m.model;
    sel.append(o);
  }
  if (!state.models.length) { const o=document.createElement("option"); o.textContent="(no models configured)"; sel.append(o); }
  sel.onchange = () => {
    const opt = sel.selectedOptions[0]; if (!opt || !opt.dataset.model) return;
    send({ type:"select_model", thread_id: state.threadId, model_ref:{ provider:opt.dataset.provider, model:opt.dataset.model, reasoning_effort:null } });
  };
}
function setModel(key) { const sel=$("modelSel"); for (const o of sel.options) if (o.value===key) { o.selected=true; break; } }

function renderTokens(led) {
  if (!led || !led.total) return;
  const t = led.total;
  const tile = (label, val) =>
    `<div class="stat"><div class="statlabel">${label}</div><div class="statval">${val.toLocaleString()}</div></div>`;
  $("ctxTokens").innerHTML =
    `<div class="stats">${tile("Input", t.input)}${tile("Output", t.output)}${tile("Total", t.total)}</div>`;
  updateGauge(t.total, state.contextWindow||0);
}
function updateGauge(used, window) {
  state.contextWindow = window || state.contextWindow || 0;
  const w = state.contextWindow;
  $("gauge").textContent = w ? `${fmt(used)} / ${fmt(w)}` : `${fmt(used)} tokens`;
}
function fmt(n) { return n>=1000 ? (n/1000).toFixed(1)+"k" : String(n); }
function notice(text, severity) {
  const cls = severity===true || severity==="error" ? " err" : severity==="warning" ? " warn" : "";
  const el = document.createElement("div"); el.className="notice"+cls; el.textContent=text;
  $("notices").prepend(el); setTimeout(()=>el.remove(), 8000);
}
function escapeHtml(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* Infinite scroll: load older history when the transcript is scrolled near the top. */
$("transcript").addEventListener("scroll", onTranscriptScroll);

/* ---------- resizable side columns (persisted client-side) ---------- */
function initResizers() {
  const app = $("app");
  const savedL = localStorage.getItem("giskard.colLeft");
  const savedR = localStorage.getItem("giskard.colRight");
  if (savedL) app.style.setProperty("--col-left", savedL);
  if (savedR) app.style.setProperty("--col-right", savedR);
  setupResizer($("resizeLeft"), "--col-left", "giskard.colLeft", true, 260);
  setupResizer($("resizeRight"), "--col-right", "giskard.colRight", false, 300);
}
function setupResizer(handle, cssVar, storeKey, isLeft, fallback) {
  handle.addEventListener("mousedown", (e) => {
    e.preventDefault();
    handle.classList.add("active");
    const app = $("app");
    const startX = e.clientX;
    const startW = parseInt(getComputedStyle(app).getPropertyValue(cssVar)) || fallback;
    const onMove = (ev) => {
      // Left handle grows the left column as you drag right; right handle grows the right
      // column as you drag left. Clamp so neither side can crowd out the center transcript.
      const delta = ev.clientX - startX;
      const w = Math.max(180, Math.min(560, isLeft ? startW + delta : startW - delta));
      app.style.setProperty(cssVar, w + "px");
    };
    const onUp = () => {
      handle.classList.remove("active");
      localStorage.setItem(storeKey, getComputedStyle(app).getPropertyValue(cssVar).trim());
      document.removeEventListener("mousemove", onMove);
      document.removeEventListener("mouseup", onUp);
      document.body.style.userSelect = "";
    };
    document.body.style.userSelect = "none";
    document.addEventListener("mousemove", onMove);
    document.addEventListener("mouseup", onUp);
  });
}
initResizers();

/* ---------- appearance theme (persisted client-side) ---------- */
const APPEARANCES = ["ide","bubbles","terminal"];
function applyAppearance(a) {
  if (!APPEARANCES.includes(a)) a = "ide";
  document.documentElement.setAttribute("data-appearance", a);
  localStorage.setItem("giskard.appearance", a);
  const sel = $("appearanceSel"); if (sel) sel.value = a;
}
$("appearanceSel").onchange = () => applyAppearance($("appearanceSel").value);
applyAppearance(localStorage.getItem("giskard.appearance") || "ide");

/* Try to enter the app directly if already authenticated. */
(async () => { try { await api("GET","/api/projects"); startApp(); } catch {} })();
</script>
</body>
